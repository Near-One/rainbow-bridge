[beacon]
endpoint = "http://unstable.sepolia.beacon-api.nimbus.team"

[execution]
endpoint = "https://ethereum-sepolia-rpc.publicnode.com"
max_batch_size = 500

[near]
endpoint = "https://rpc.testnet.near.org"
eth_light_client_account_id = "client-eth2.sepolia.testnet"
signer_account_id = "relayer.testnet"
secret_key = "ed25519:YOUR_PRIVATE_KEY_HERE"
timeout_secs = 30

[relayer]
update_interval_epochs = 1
headers_batch_size = 100
max_headers_per_loop = 1000
sync_sleep_secs = 60
submission_sleep_secs = 12
dry_run = false
fast_mode = false

[init]
network = "sepolia"
init_update = "../contracts/near/eth2-client/src/data/sepolia/light_client_update_period_925.json"
first_update = "../contracts/near/eth2-client/src/data/sepolia/light_client_update_period_926.json"
headers = "../contracts/near/eth2-client/src/data/sepolia/execution_blocks_8286935_8295112.json"
hashes_gc_threshold = 51000

[logging]
level = "info"
json = false
